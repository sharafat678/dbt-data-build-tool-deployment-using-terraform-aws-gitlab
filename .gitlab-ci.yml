stages:
  - IAC
  - copy-to-s3
  - ssm-logic
  - dag-logic
  - build-image
  - destroy

variables:
  REGION: cn-northwest-1 #$REGION
  AWS_PARTITION: aws-cn
  ROLE_ARN: arn:aws-cn:iam::$AWS_ACCOUNT_ID:role/team-account-deploy-gitlabscaniacomcn-dbt
  AWS_ACCOUNT_ID: $AWS_ACCOUNT_ID
  DOCKER_HOST: tcp://docker:2375  # This environment variable sets the address of the Docker daemon for the pipeline to communicate with. It tells the CI job to use a remote Docker daemon available at the specified TCP address.
  DOCKER_TLS_CERTDIR: "" #This environment variable disables the use of Docker's TLS certificate directory for secure connections to the Docker daemon.Docker-in-Docker (DinD) by default uses TLS for security, but setting this to an empty string disables TLS for simplicity during CI/CD execution. It's typically done in a trusted environment where security of the Docker daemon communication isn't a concern.
  ECR_URL: $AWS_ACCOUNT_ID.dkr.ecr.cn-northwest-1.amazonaws.com.cn #$ECR_URL
  SNOWFLAKE_ACCOUNT: $SNOWFLAKE_ACCOUNT
  SNOWFLAKE_USER: $SNOWFLAKE_USER
  #donot declare sensitive variables....
  SNOWFLAKE_PASSWORD: $SNOWFLAKE_PASSWORD
  repo_name: $repo_name
 
default:
  image: 
    name: "registry.gitlab.scania.com.cn/datalake/dbt-infra-s3:latest" # terraform + aws-cli  image
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.scania.com.cn

.assume_role:
  - >
    export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
    $(aws sts assume-role-with-web-identity
    --role-arn $ROLE_ARN
    --role-session-name "GitLabRunner-$CI_PROJECT_ID-$CI_PIPELINE_ID"
    --web-identity-token $GITLAB_OIDC_TOKEN
    --duration-seconds 3600
    --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
    --region $REGION
    --output text))
  - aws sts get-caller-identity --region $REGION

IAC:
  stage: IAC
  before_script:
    - !reference [.assume_role]
  script:
    - cd IAC/root
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    - terraform validate
    - >
      terraform plan -out=planfile \
        -var-file="terraform.tfvars" \
        -var "snowflake_account=$SNOWFLAKE_ACCOUNT" \
        -var "snowflake_user=$SNOWFLAKE_USER" \
        -var "snowflake_password=$SNOWFLAKE_PASSWORD" \
        -var "maximo_user=$MAXIMO_USER" \
        -var "maximo_password=$MAXIMO_PASSWORD"

    - terraform apply -input=false --auto-approve "planfile"
  rules:
    - changes:
        - IAC/**/*
  
  when: manual
  retry: 2



ssm-logic:
  stage: ssm-logic
  before_script:
    - !reference [.assume_role]
  script:
    - pwd
    - cd IAC/root/
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    - terraform output -json > $CI_PROJECT_DIR/terraform_outputs.json
    - cat $CI_PROJECT_DIR/terraform_outputs.json
    - TF_OUTPUT="$CI_PROJECT_DIR/terraform_outputs.json"
    - cd $CI_PROJECT_DIR
    # Parse Terraform output JSON
  
    # Store subnet IDs (as JSON string)
    - aws ssm put-parameter --name "/airflow/subnet_ids" --value "$(jq -c '.subnet_ids.value' $TF_OUTPUT)" --type String --overwrite

    # Store security groups (as JSON string)
    - aws ssm put-parameter --name "/airflow/security_group_ids" --value "$(jq -c '.mwaa_env_security_group_id.value | [.]' $TF_OUTPUT)" --type String --overwrite

    # Store cluster name
    - aws ssm put-parameter --name "/airflow/cluster_name" --value "$(jq -r '.cluster_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store ECS task definition
    - aws ssm put-parameter --name "/airflow/task_definition" --value "$(jq -r '.full_task_definition_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store container name
    - aws ssm put-parameter --name "/airflow/container_name" --value "$(jq -r '.container_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store SNS topic ARN
    - aws ssm put-parameter --name "/airflow/sns_topic_arn" --value "$(jq -r '.sns_topic_arn.value' $TF_OUTPUT)" --type String --overwrite


dag-logic:
  stage: dag-logic
  before_script:
    - !reference [.assume_role]
  script:
    - pwd
    - cd IAC/root/
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    - terraform output -json > $CI_PROJECT_DIR/terraform_outputs.json
    - cat $CI_PROJECT_DIR/terraform_outputs.json
    - cd $CI_PROJECT_DIR
    - chmod +x update_dag.sh
    - ./update_dag.sh   #this logic will update and upload the dag file in the s3 bucket
    - cat dags/dbt_ecs_task.py
  #basically: run this job only if changes happen inside dags/ or IAC/ directories.
  rules:
    - changes:
        - dags/**
        - IAC/** 

build-image:
  stage: build-image
  services:
    - name: "public.ecr.aws/b4p2j5t6/dind:latest"  # Use the custom dind image........
      alias: docker
  before_script:
    - !reference [.assume_role]
  script:
    - docker info
    - docker build -t $repo_name -f ./project/Dockerfile ./project
    - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.cn-northwest-1.amazonaws.com.cn
    # Remove the existing image in ECR (tag: latest)
    - aws ecr batch-delete-image --repository-name "$repo_name" --image-ids imageTag=latest --region "$REGION" || echo "No existing image to delete"
    - docker tag $repo_name:latest $ECR_URL/$repo_name:latest
    - docker push $ECR_URL/$repo_name:latest
  rules:
    - changes:
        - project/**
