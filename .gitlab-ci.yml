default:
  image: 
    name: "registry.gitlab.scania.com.cn/datalake/dbt-infra-s3:latest" #"registry.gitlab.scania.com.cn/datalake/dbt-multi:latest" 
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.scania.com.cn

.assume_role:
  - >
    export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
    $(aws sts assume-role-with-web-identity
    --role-arn $ROLE_ARN
    --role-session-name "GitLabRunner-$CI_PROJECT_ID-$CI_PIPELINE_ID"
    --web-identity-token $GITLAB_OIDC_TOKEN
    --duration-seconds 3600
    --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
    --region $REGION
    --output text))
  - aws sts get-caller-identity --region $REGION

IAC:
  stage: IAC
  before_script:
    - !reference [.assume_role]
  script:
    - cd IAC/root
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    - terraform validate
    - >
      terraform plan -out=planfile \
        -var-file="terraform.tfvars" \
        -var "snowflake_account=$SNOWFLAKE_ACCOUNT" \
        -var "snowflake_user=$SNOWFLAKE_USER" \
        -var "snowflake_password=$SNOWFLAKE_PASSWORD" \
        -var "maximo_user=$MAXIMO_USER" \
        -var "maximo_password=$MAXIMO_PASSWORD"

    # -var "s3_bucket_name=$bucket_name" \
        # -var "ecr_repository_name=$repo_name"

    - terraform apply -input=false --auto-approve "planfile"
  rules:
    - changes:
        - IAC/**/*
  
  when: manual
#  retry: 2



ssm-logic:
  stage: ssm-logic
  before_script:
    - !reference [.assume_role]
  script:
    - pwd
    - cd IAC/root/
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    - terraform output -json > $CI_PROJECT_DIR/terraform_outputs.json
    - cat $CI_PROJECT_DIR/terraform_outputs.json
    - TF_OUTPUT="$CI_PROJECT_DIR/terraform_outputs.json"
    - cd $CI_PROJECT_DIR
    # Parse Terraform output JSON
  

      # Store subnet IDs (as JSON string)
    - aws ssm put-parameter --name "/airflow/subnet_ids" --value "$(jq -c '.subnet_ids.value' $TF_OUTPUT)" --type String --overwrite

    # Store security groups (as JSON string)
    - aws ssm put-parameter --name "/airflow/security_group_ids" --value "$(jq -c '.mwaa_env_security_group_id.value | [.]' $TF_OUTPUT)" --type String --overwrite

    # Store cluster name
    - aws ssm put-parameter --name "/airflow/cluster_name" --value "$(jq -r '.cluster_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store ECS task definition
    - aws ssm put-parameter --name "/airflow/task_definition" --value "$(jq -r '.full_task_definition_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store container name
    - aws ssm put-parameter --name "/airflow/container_name" --value "$(jq -r '.container_name.value' $TF_OUTPUT)" --type String --overwrite

    # Store SNS topic ARN
    - aws ssm put-parameter --name "/airflow/sns_topic_arn" --value "$(jq -r '.sns_topic_arn.value' $TF_OUTPUT)" --type String --overwrite
  when: manual
