destroy:
  stage: destroy
  before_script:
    - !reference [.assume_role]
  script:
    - |
      aws s3api list-object-versions --bucket $bucket_name \
        --query "Versions[].[Key,VersionId]" --output text | while read key version_id; do
          aws s3api delete-object --bucket $bucket_name \
            --key "$key" --version-id "$version_id"
        done > /dev/null 2>&1 || true
    - aws ecr batch-delete-image --repository-name $repo_name --image-ids imageTag=latest > /dev/null 2>&1 || true
    
    - cd IAC/root
    - unzip -o my_terraform_providers.zip -d my_terraform_providers
    - terraform init -input=false -reconfigure
    # - >
    #   terraform plan -out=planfile
    #   -var "snowflake_account=$SNOWFLAKE_ACCOUNT"
    #   -var "snowflake_user=$SNOWFLAKE_USER"
    #   -var "snowflake_password=$SNOWFLAKE_PASSWORD"
    #   -var "s3_bucket_name=$bucket_name"
    #   -var "ecr_repository_name=$repo_name" 
    # - terraform destroy -var="snowflake_account=$SNOWFLAKE_ACCOUNT" -var="snowflake_user=$SNOWFLAKE_USER" -var="snowflake_password=$SNOWFLAKE_PASSWORD" -var="s3_bucket_name=$bucket_name" -var="ecr_repository_name=$repo_name" -auto-approve
    - terraform validate
    - >
      terraform plan -destroy -out=destroyplan \
        -var-file="terraform.tfvars" \
        -var "snowflake_account=$SNOWFLAKE_ACCOUNT" \
        -var "snowflake_user=$SNOWFLAKE_USER" \
        -var "snowflake_password=$SNOWFLAKE_PASSWORD" \
        -var "maximo_user=$MAXIMO_USER" \
        -var "maximo_password=$MAXIMO_PASSWORD"

    # -var "s3_bucket_name=$bucket_name" \
        # -var "ecr_repository_name=$repo_name"

    #- terraform destroy -input=false --auto-approve "planfile" 
    - terraform apply -auto-approve "destroyplan"
  when: manual
